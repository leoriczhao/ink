name: Deploy Docs

on:
  push:
    branches: [master]

jobs:
  deploy-docs:
    runs-on: [self-hosted, docs-deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq doxygen graphviz python3-pip
          sudo pip3 install sphinx breathe sphinx-rtd-theme || sudo pip3 install sphinx breathe sphinx-rtd-theme --break-system-packages

      - name: Build docs
        run: |
          mkdir -p docs/_build/doxygen
          doxygen Doxyfile
          sphinx-build -b html docs docs/_build/sphinx

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/_build/sphinx --project-name=ink-docs
